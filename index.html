px;overflow:auto;padding:10px 16px;background:rgba(238,242,247,.94);border-bottom:1px solid var(--line)}[data-theme=dark] .tabs{background:rgba(16,24,39,.94)}.tab{white-space:nowrap;border:0;border-radius:999px;padding:10px 14px;background:var(--card);color:var(--ink);font-weight:800}.tab.active{background:var(--accent);color:#fff}main{max-width:980px;margin:auto;padding:14px 16px 90px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px;margin:0 0 14px;box-shadow:var(--shadow)}.day-head{display:flex;justify-content:space-between;gap:12px}.day-head h2{margin:0;font-size:19px;border-left:6px solid var(--accent);padding-left:10px}.tag{display:inline-block;font-size:12px;font-weight:700;color:#1e3a8a;background:var(--soft);padding:4px 8px;border-radius:999px;margin:2px}[data-theme=dark] .tag{color:#bfdbfe}.progress{min-width:60px;text-align:center;border-radius:18px;padding:8px 10px;background:var(--bg);border:1px solid var(--line);font-weight:900;color:#1d4ed8}[data-theme=dark] .progress{color:#93c5fd}.item{padding:14px 0 14px 20px;border-top:1px solid var(--line);border-left:4px solid #bfdbfe}.item:first-of-type{border-top:0;margin-top:8px}.time{display:inline-block;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:3px 8px;border-radius:999px;font-weight:900;font-size:13px}[data-theme=dark] .time{background:#1f3a5f;color:#bfdbfe}.item-title{display:flex;gap:8px;align-items:flex-start;margin-top:6px}.item-title input{transform:scale(1.25);margin-top:4px}.done strong{text-decoration:line-through;color:#6b7280}.done{opacity:.65}.loc{color:var(--muted);font-size:13px;margin:4px 0}.note{color:var(--ink)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.action{text-decoration:none;border-radius:14px;padding:9px 11px;font-size:13px;font-weight:800;color:#fff;background:var(--accent)}.action.alt{color:#1d4ed8;background:var(--soft)}[data-theme=dark] .action.alt{color:#dbeafe}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.ticket,.map-card,.shop-card,.phrase-card,.info-card,.transit-card,.payment-card{border:1px solid var(--line);border-radius:18px;padding:13px;background:var(--card)}.status{font-size:12px;font-weight:900;border-radius:999px;padding:4px 8px;display:inline-block;margin-bottom:8px}.status.done{color:#166534;background:#dcfce7}.status.todo{color:#92400e;background:#fef3c7}.top{position:fixed;right:16px;bottom:18px;border:0;border-radius:999px;background:var(--accent);color:#fff;padding:12px 15px;box-shadow:0 8px 24px rgba(0,0,0,.24);font-weight:900}.empty{text-align:center;color:var(--muted);padding:28px}.copy,.speak{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:8px 10px;font-weight:800}.install-tip{font-size:13px;margin-top:8px;color:rgba(255,255,255,.9)}.rate-panel{display:grid;gap:12px}.rate-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:end}.rate-field label{display:block;font-size:13px;font-weight:900;color:var(--muted);margin-bottom:4px}.rate-field input,.rate-field select{width:100%;border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--ink);font-size:18px;padding:12px}.rate-swap{border:0;border-radius:999px;background:var(--accent);color:#fff;font-weight:900;width:44px;height:44px}.rate-result{font-size:28px;font-weight:900;color:var(--accent)}.rate-meta{font-size:13px;color:var(--muted)}.phrase-roman{color:var(--muted);font-size:14px;margin:4px 0 10px}.tel-link{color:var(--accent);font-weight:900;text-decoration:none}.transit-card h3,.payment-card h3{margin:.1em 0}.transit-meta,.payment-meta{font-size:13px;color:var(--muted)}.payment-rank{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;border-radius:999px;background:var(--accent);color:#fff;font-weight:900;margin-right:6px}.payment-table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:var(--card)}.payment-table{width:100%;border-collapse:collapse;min-width:900px}.payment-table th,.payment-table td{border-bottom:1px solid var(--line);padding:11px;text-align:left;vertical-align:top}.payment-table th{background:var(--soft);color:var(--ink);font-size:13px}.payment-table tr:last-child td{border-bottom:0}.source-link{color:var(--accent);font-weight:900;text-decoration:none}.reminder-list{display:grid;gap:8px;margin:10px 0 0;padding:0;list-style:none}.reminder-list li{border:1px solid var(--line);border-radius:14px;padding:10px;background:var(--bg);color:var(--ink)}.update-toast{position:fixed;left:16px;right:16px;bottom:72px;z-index:40;display:none;align-items:center;justify-content:space-between;gap:12px;max-width:520px;margin:auto;padding:12px 14px;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:0 16px 40px rgba(0,0,0,.22)}.update-toast.show{display:flex}.update-toast strong{display:block}.update-toast p{font-size:13px}.update-toast button{border:0;border-radius:12px;background:var(--accent);color:#fff;padding:9px 12px;font-weight:900;white-space:nowrap}@media(max-width:620px){.tabs{top:73px}.grid,.rate-row,.weather-strip{grid-template-columns:1fr}h1{font-size:20px}.app-header p{font-size:12px}.rate-swap{width:100%}.hero-top{display:block}.trip-status{display:inline-block;margin-top:8px}.payment-table{min-width:760px}.payment-table th,.payment-table td{padding:9px;font-size:13px}.update-toast{bottom:64px}}

<script>
const data={days:[{id:'day1',title:'Day 1｜6/30（二）抵達首爾',summary:'台中出發、仁川抵達、入住 Stayrak Hotel',tags:['機場','入住','輕鬆'],items:[['17:00','TW670 台中 T2 出發','Taichung International Airport','提早 2 小時抵達機場，確認護照、電子票、eSIM QR code。','https://maps.google.com/?q=Taichung+International+Airport','https://www.flightradar24.com/data/flights/tw670'],['20:45','抵達仁川 T1','Incheon International Airport T1','四人＋行李多可考慮 KKday/Klook 包車；若搭 AREX 可預購電子票。','https://maps.google.com/?q=Incheon+International+Airport+Terminal+1'],['晚間','前往 Stayrak Hotel','211-5 Toegye-ro, Jung-gu, Seoul','入住後便利商店補水、T-money/WOWPASS 儲值。','https://maps.google.com/?q=Stayrak+Hotel+211-5+Toegye-ro+Seoul']]},{id:'day2',title:'Day 2｜7/1（三）韓國歷史文化巡禮',summary:'韓服、景福宮、廣藏市場、北村、三清洞、益善洞',tags:['韓服','景福宮','廣藏市場','北村','益善洞'],items:[['08:00-08:50','Isaac Toast 明洞聖堂店','明洞聖堂附近','建議提早出門，外帶後在明洞聖堂附近享用。','https://maps.google.com/?q=Isaac+Toast+Myeongdong+Cathedral'],['09:00-11:30','韓服體驗＋景福宮','景福宮站','建議 KKday/Klook 預約韓服；穿韓服入景福宮免費。','https://maps.google.com/?q=Gyeongbokgung+Palace'],['12:00-13:30','廣藏市場午餐','Gwangjang Market','富村生牛肉、綠豆煎餅、刀削麵、麻藥飯捲、糯米麻花捲擇 3–4 樣即可。','https://maps.google.com/?q=Gwangjang+Market'],['14:00-16:00','北村韓屋村 → 三清洞 → Blue Bottle','安國站 / 北村文化中心','居民區請安靜；炎熱時先進咖啡店休息。','https://maps.google.com/?q=Bukchon+Cultural+Center'],['17:00-18:30','益善洞韓屋村','Ikseon-dong','傍晚燈光漂亮，建議留 60–90 分鐘。','https://maps.google.com/?q=Ikseon-dong+Hanok+Village'],['19:00','晚餐：王妃家明洞本店','Myeongdong','熱門時段可能排隊，建議提早取號。備案：江南麵店仁寺店。','https://maps.google.com/?q=Wangbijib+Myeongdong+Main+Store']]},{id:'day3',title:'Day 3｜7/2（四）首爾地標與明洞購物',summary:'DDP、南山首爾塔、明洞韓牛與購物',tags:['DDP','首爾塔','明洞','購物'],items:[['09:00-10:00','早餐：EGG DROP 明洞店','明洞','步行約 550m，輕食快速。','https://maps.google.com/?q=EGG+DROP+Myeongdong'],['10:00-12:00','東大門 DDP','Dongdaemun Design Plaza','若沒有看特展，60–90 分鐘即可；出發前查是否有想看的展覽。','https://maps.google.com/?q=Dongdaemun+Design+Plaza'],['14:15-17:50','南山纜車＋N 首爾塔','Namsan Cable Car / N Seoul Tower','建議 KKday/Klook 買纜車＋展望台套票；假日排隊需預留 30–60 分鐘。','https://maps.google.com/?q=N+Seoul+Tower'],['18:00-19:30','明洞站著吃韓牛','Myeongdong','建議 17:40 前抵達；若排太久可改烤肉備案。','https://maps.google.com/?q=Myeongdong+standing+beef+BBQ'],['19:30-21:30','明洞購物','LINE FRIENDS / Olive Young / ALAND / Harmony Mart','熱門商品看到就買，不建議等最後一天。','https://maps.google.com/?q=Olive+Young+Myeongdong+Flagship']]},{id:'day4',title:'Day 4｜7/3（五）新沙・狎鷗亭・聖水・漢江',summary:'江南潮流、聖水設計品牌、漢江泡麵夜景',tags:['江南','聖水','漢江','夜景'],items:[['09:00-10:00','早餐：瑞源粥','明洞','鮑魚粥、人蔘雞粥、蝦粥。','https://maps.google.com/?q=Seowon+Porridge+Myeongdong'],['10:35-12:00','新沙洞林蔭道','Sinsa-dong Garosu-gil','Gentle Monster、Tamburins、Cafe Kitsune。','https://maps.google.com/?q=Sinsa-dong+Garosu-gil'],['12:15-13:40','狎鷗亭羅德奧','Apgujeong Rodeo','London Bagel 建議外帶；K-Star Road 可順拍。','https://maps.google.com/?q=Apgujeong+Rodeo+Street'],['13:40-14:20','前往聖水洞','Seongsu-dong','修正版：狎鷗亭直接去聖水，不要繞弘大。','https://maps.google.com/?q=Seongsu-dong+Seoul'],['14:30-16:00','午餐：祖傳三代馬鈴薯排骨湯','Seongsu','避開正中午排隊較佳。','https://maps.google.com/?q=Somunnan+Seongsu+Gamjatang'],['16:00-18:30','聖水洞購物＋大林倉庫咖啡','Dior / Mardi / Stand Oil / Fwee / Amore / Daelim Changgo','排隊店多，建議先逛最想買的品牌。','https://maps.google.com/?q=Daelim+Changgo+Seongsu'],['18:40-21:10','纛島漢江公園','Ttukseom Hangang Park','騎腳踏車、GS25 自煮泡麵、夜景散步。可先下載 Seoul Bike / Ttareungi。','https://maps.google.com/?q=Ttukseom+Hangang+Park']]},{id:'day5',title:'Day 5｜7/4（六）弘大・明洞收尾',summary:'弘大延南洞、明洞聖堂、晚餐收尾',tags:['弘大','明洞聖堂','購物'],items:[['10:00','前往弘大','弘大入口站','弘大店家多 11:00 後才開，不建議太早去。','https://maps.google.com/?q=Hongdae+Shopping+Street'],['10:30-15:00','弘大 / 延南洞逛街＋午餐','Hongdae / Yeonnam','延南站著吃可體驗；夏天若太熱改有冷氣餐廳。','https://maps.google.com/?q=Yeonnam-dong+Seoul'],['15:00-17:00','明洞補購或回飯店休息','Myeongdong','若體力尚可，建議直接從弘大去明洞，減少來回交通。','https://maps.google.com/?q=Myeongdong+Shopping+Street'],['17:00-19:00','PINES / 明洞聖堂周邊','PAGE 明洞大樓 3F / Myeongdong Cathedral','黃昏拍照漂亮。','https://maps.google.com/?q=Myeongdong+Cathedral'],['20:00-21:30','元堂馬鈴薯排骨湯 明洞 1 號店','Myeongdong','晚餐後步行 12–15 分鐘回飯店。','https://maps.google.com/?q function tripStatus(){const today=new Date();today.setHours(0,0,0,0);const start=new Date(`${trip.start}T00:00:00`),end=new Date(`${trip.end}T00:00:00`),day=86400000;if(today<start)return`出發倒數 ${Math.ceil((start-today)/day)} 天`;if(today<=end)return`Day ${Math.floor((today-start)/day)+1} · 今天`;return'旅程結束'}
function weatherLabel(code){if([0].includes(code))return'晴朗';if([1,2,3].includes(code))return'多雲';if([45,48].includes(code))return'有霧';if([51,53,55,56,57].includes(code))return'毛毛雨';if([61,63,65,66,67,80,81,82].includes(code))return'降雨';if([71,73,75,77,85,86].includes(code))return'降雪';if([95,96,99].includes(code))return'雷雨';return'天氣更新'}
function weatherIcon(code){if(code===0)return'☀';if([1,2,3].includes(code))return'⛅';if([45,48].includes(code))return'🌫';if([61,63,65,66,67,80,81,82].includes(code))return'🌧';if([95,96,99].includes(code))return'⛈';return'🌡'}
function formatWeatherDate(iso){return new Date(`${iso}T00:00:00+09:00`).toLocaleDateString('zh-TW',{timeZone:'Asia/Seoul',month:'numeric',day:'numeric',weekday:'short'})}
function renderHeroStatus(){document.getElementById('tripStatus').textContent=tripStatus()}
function renderWeatherStrip(){const box=document.getElementById('weatherStrip');if(!box)return;if(!weather.days){box.innerHTML=['今日','明日'].map(x=>`<div class="weather-mini"><b>${x}</b><div class="weather-temp">${weather.loading?'載入中':'待更新'}</div><div class="weather-meta">首爾預報，連網後更新</div></div>`).join('');return}box.innerHTML=weather.days.map((d,i)=>`<div class="weather-mini"><b>${i?'明日':'今日'} · ${formatWeatherDate(d.date)}</b><div class="weather-temp">${weatherIcon(d.code)} ${Math.round(d.min)}-${Math.round(d.max)}°C</div><div class="weather-meta">${weatherLabel(d.code)}｜降雨機率 ${d.rain??0}%</div></div>`).join('')}
function loadWeather(){if(weather.loading)return;weather.loading=true;renderWeatherStrip();fetch('https://api.open-meteo.com/v1/forecast?latitude=37.5665&longitude=126.9780&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FSeoul&forecast_days=2',{cache:'no-store'}).then(r=>r.json()).then(j=>{const d=j.daily;if(!d||!d.time)throw new Error('missing daily forecast');weather.days=d.time.slice(0,2).map((date,i)=>({date,code:d.weather_code[i],max:d.temperature_2m_max[i],min:d.temperature_2m_min[i],rain:d.precipitation_probability_max?d.precipitation_probability_max[i]:0}));weather.updated=new Date().toISOString()}).catch(()=>{weather.days=null}).finally(()=>{weather.loading=false;renderWeatherStrip()})}
function loadPayment(){if(payment||paymentLoading)return;paymentLoading=true;fetch('./data/payment.json').then(r=>{if(!r.ok)throw new Error('payment data');return r.json()}).then(j=>{payment=j}).catch(()=>{payment=null}).finally(()=>{paymentLoading=false;if(currentView==='payment')renderPayment()})}
function paymentText(x){return JSON.stringify(x)}
function paymentItems(list){return (list||[]).filter(x=>matches(paymentText(x)))}
function paymentTable(headers,rows){if(!rows.length)return'<div class="card empty">找不到符合的支付資料</div>';return `<div class="payment-table-wrap"><table class="payment-table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function renderPayment(){if(!payment){if(!paymentLoading)loadPayment();app.innerHTML=`<section class="card"><h2>支付建議 / Payment</h2><p>${paymentLoading?'正在載入支付建議...':'支付資料暫時無法載入，連網後請再試一次。'}</p></section>`;return}const priority=paymentItems(payment.priority),quick=paymentItems(payment.quickRules),scenarios=paymentItems(payment.scenarios),offers=paymentItems(payment.offers),sources=paymentItems(payment.sources),reminders=payment.reminders.filter(x=>matches(x)||!query);const heroMatches=matches(`${payment.title} ${payment.userContext.join(' ')} ${payment.searchKeywords.join(' ')}`);const sections=[];if(heroMatches)sections.push(`<section class="card"><h2>${payment.title}</h2><p>這份策略已套用：非 icash Pay 新戶、有元大銀行帳戶、持有中信 UniOpen 卡與星展 eco 永續卡。eSIM 已購買，本頁不再提醒購買。</p><div class="actions"><a class="action" target="_blank" href="${payment.sources[1].url}">悠遊付官方活動</a><a class="action alt" target="_blank" href="${payment.sources[0].url}">icash Pay 活動</a><a class="action alt" target="_blank" href="${payment.sources[2].url}">台灣Pay TWQR</a></div></section>`);if(priority.length)sections.push(`<section class="card"><h2>最佳支付優先順序</h2><div class="grid">${priority.map(x=>`<div class="payment-card"><h3><span class="payment-rank">${x.rank}</span>${x.title}</h3><p>${x.recommendation}</p></div>`).join('')}</div></section>`);if(quick.length)sections.push(`<section class="card"><h2>快速判斷</h2><div class="grid">${quick.map(x=>`<div class="payment-card"><h3>${x.trigger}</h3><p><b>${x.action}</b></p><p class="payment-meta">${x.note}</p></div>`).join('')}</div></section>`);if(scenarios.length)sections.push(`<section class="card"><h2>依場景建議支付方式</h2>${paymentTable(['場景','建議','注意'],scenarios.map(x=>[x.scene,x.recommendation,x.note]))}</section>`);if(offers.length)sections.push(`<section class="card"><h2>優惠比較表</h2>${paymentTable(['支付工具','適用期間','回饋重點','使用條件','回饋上限','適合場景','注意事項'],offers.map(x=>[x.tool,x.period,x.benefit,x.conditions,x.cap||'依官方公告與 App 顯示為準',x.scenes,x.notes]))}</section>`);if(sources.length)sections.push(`<section class="card"><h2>官方來源</h2><div class="grid">${sources.map(x=>`<div class="payment-card"><h3>${x.name}</h3><p>${x.summary}</p><div class="actions"><a class="action alt source-link" target="_blank" href="${x.url}">開啟官方頁</a></div></div>`).join('')}</div></section>`);if(reminders.length)sections.push(`<section class="card"><h2>重要提醒</h2><ul class="reminder-list">${reminders.map(x=>`<li>${x}</li>`).join('')}</ul></section>`);app.innerHTML=sections.join('')||'<div class="card empty">找不到符合的支付建議</div>'}
function render(){if(currentView==='timeline')return renderTimeline();if(currentView==='summary')return renderInfo('重點修正與提醒',data.summary);if(currentView==='currency')return renderCurrency();if(currentView==='payment')return renderPayment();if(currentView==='tickets')return renderTickets();if(currentView==='maps')return renderMaps();if(currentView==='transit')return renderTransit();if(currentView==='shopping')return renderShopping();if(currentView==='phrases')return renderPhrases();renderInfo('緊急資訊',data.emergency)}
function renderTimeline(){const html=data.days.map(day=>{const items=day.items.map(itemObj);const visible=items.filter(i=>matches(`${day.title} ${day.summary} ${day.tags.join(' ')} ${i.time} ${i.title} ${i.location} ${i.note} ${i.flight?`FlightRadar ${i.flight}`:''}`));if(!visible.length&&query)return'';const done=items.filter((_,i)=>checked(day.id,i)).length;return `<section class="card"><div class="day-head"><div><h2>${day.title}</h2><p>${day.summary}</p><div>${day.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div><div class="progress">${done}/${items.length}</div></div>${visible.map(item=>{const idx=items.findIndex(x=>x.title===item.title);const isDone=checked(day.id,idx);return `<div class="item ${isDone?'done':''}"><span class="time">${item.time}</span><label class="item-title"><input type="checkbox" data-day="${day.id}" data-idx="${idx}" ${isDone?'checked':''}><strong>${item.title}</strong></label><div class="loc">📍 ${item.location}</div><div class="note">${item.note}</div><div class="actions"><a class="action" target="_blank" href="${item.maps}">Google Maps</a><a class="action alt" target="_blank" href="${naver(item.title)}">Naver</a><a class="action alt" target="_blank" href="${kakao(item.title)}">Kakao</a>${item.flight?`<a class="action alt" target="_blank" href="${item.flight}">FlightRadar</a>`:""}</div></div>`}).join('')}</section>`}).join('');app.innerHTML=html||'<div class="card empty">找不到符合的行程</div>';document.querySelectorAll('input[data-day]').forEach(box=>box.addEventListener('change',e=>{setChecked(e.target.dataset.day,e.target.dataset.idx,e.target.checked);renderTimeline()}))}
function renderInfo(title,rows){const list=rows.filter(r=>matches(r.join(' ')));app.innerHTML=`<section class="card"><h2>📌 ${title}</h2><div class="grid">${list.map(r=>`<div class="info-card"><h3>${r[0]}</h3><p>${r[1]}</p></div>`).join('')}</div></section>`}
function renderCurrency(){const rate=fx.rate||0.023;app.innerHTML=`<section class="card"><h2>💱 即時匯率換算</h2><div class="rate-panel"><div class="rate-row"><div class="rate-field"><label>金額</label><input id="fxAmount" inputmode="decimal" type="number" min="0" step="1000" value="${localStorage.getItem('seoul2026:fxAmount')||'10000'}"></div><button class="rate-swap" id="fxSwap">↔</button><div class="rate-field"><label>方向</label><select id="fxMode"><option value="KRW_TWD">韓元 KRW → 台幣 TWD</option><option value="TWD_KRW">台幣 TWD → 韓元 KRW</option></select></div></div><div><div class="rate-result" id="fxResult"></div><div class="rate-meta" id="fxMeta">${fx.loading?'正在更新即時匯率...':`匯率來源：open.er-api.com。${fx.updated?`更新：${fx.updated}`:'載入中'}`}</div></div><div class="actions"><button class="action" id="fxRefresh">更新匯率</button><span class="action alt">1,000 KRW ≈ ${(1000*rate).toFixed(0)} TWD</span><span class="action alt">1 TWD ≈ ${(1/rate).toFixed(0)} KRW</span></div></div></section>`;const mode=document.getElementById('fxMode'),amount=document.getElementById('fxAmount');mode.value=localStorage.getItem('seoul2026:fxMode')||'KRW_TWD';const update=()=>{const n=Number(amount.value||0);localStorage.setItem('seoul2026:fxAmount',amount.value);localStorage.setItem('seoul2026:fxMode',mode.value);document.getElementById('fxResult').textContent=mode.value==='KRW_TWD'?`${n.toLocaleString()} KRW ≈ ${(n*rate).toLocaleString(undefined,{maximumFractionDigits:0})} TWD`:`${n.toLocaleString()} TWD ≈ ${(n/rate).toLocaleString(undefined,{maximumFractionDigits:0})} KRW`};amount.addEventListener('input',update);mode.addEventListener('change',update);document.getElementById('fxSwap').addEventListener('click',()=>{mode.value=mode.value==='KRW_TWD'?'TWD_KRW':'KRW_TWD';update()});document.getElementById('fxRefresh').addEventListener('click',()=>loadFx(true));update();if(!fx.rate&&!fx.loading)loadFx(false)}
function loadFx(force){if(fx.loading)return;fx.loading=true;if(force)document.getElementById('fxMeta').textContent='正在更新即時匯率...';fetch('https://open.er-api.com/v6/latest/KRW',{cache:'no-store'}).then(r=>r.json()).then(j=>{if(!j.rates||!j.rates.TWD)throw new Error('missing TWD rate');fx.rate=j.rates.TWD;fx.updated=j.time_last_update_utc||new Date().toISOString();fx.fallback=false}).catch(()=>{fx.rate=fx.rate||0.023;fx.updated='離線估算，請連網後重新整理';fx.fallback=true}).finally(()=>{fx.loading=false;if(currentView==='currency')renderCurrency()})}
function searchUrl(kind,q){const key=encodeURIComponent(q);return kind==='klook'?`https://www.klook.com/zh-TW/search/result/?query=${key}`:`https://www.kkday.com/zh-tw/product/productlist?keyword=${key}`}
function renderTickets(){const rows=data.tickets.filter(t=>matches(t.join(' ')));app.innerHTML=`<section class="card"><h2>🎫 票券與預約</h2><div class="grid">${rows.map(t=>{const keyword=ticketKeywords[t[1]]||t[1];return `<div class="ticket"><span class="status ${t[0]==='已購'?'done':'todo'}">${t[0]}</span><h3>${t[1]}</h3><p><b>搜尋：</b>${keyword}</p><p>${t[3]}</p><div class="actions"><a class="action" target="_blank" href="${searchUrl('klook',keyword)}">Klook 搜尋</a><a class="action alt" target="_blank" href="${searchUrl('kkday',keyword)}">KKday 搜尋</a></div></div>`}).join('')}</div></section>`}
function renderMaps(){const items=data.days.flatMap(d=>d.items.map(a=>({...itemObj(a),day:d.title}))).filter(i=>matches(`${i.day} ${i.title} ${i.location} ${i.note} ${i.flight?`FlightRadar ${i.flight}`:''}`));app.innerHTML=`<section class="card"><h2>📍 地圖導航</h2><div class="grid">${items.map(i=>`<div class="map-card"><h3>${i.title}</h3><p>${i.day}</p><p>📍 ${i.location}</p><div class="actions"><a class="action" target="_blank" href="${i.maps}">Google</a><a class="action alt" target="_blank" href="${naver(i.title)}">Naver</a><a class="action alt" target="_blank" href="${kakao(i.title)}">Kakao</a>${i.flight?`<a class="action alt" target="_blank" href="${i.flight}">FlightRadar</a>`:""}</div></div>`).join('')}</div></section>`}
function renderTransit(){const bus=transit.bus.filter(r=>matches(r.join(' '))),ticket=transit.busTicket.filter(t=>matches(t)||!query),subway=transit.subway.filter(r=>matches(r.join(' '))),taxi=transit.taxi.filter(r=>matches(r.join(' '))),tips=transit.tips.filter(t=>matches(t));app.innerHTML=`<section class="card"><h2>🚇 交通工具</h2><p>6015 機場巴士、地鐵路線、計程車估價、叫車與雨天取捨。巴士時刻依 2026/6/30 官方頁查詢，現場仍以官方即時公告為準。</p></section><section class="card"><h2>6015 機場巴士時刻</h2><div class="grid">${bus.map(r=>`<div class="transit-card"><h3>${r[0]}</h3><p><b>${r[1]}</b></p><p>${r[2]}</p><div class="actions"><a class="action alt" target="_blank" href="${r[3]}">官方時刻表</a></div></div>`).join('')}</div></section><section class="card"><h2>巴士取票與搭乘提醒</h2><div class="grid">${ticket.map(t=>`<div class="transit-card"><p>${t}</p></div>`).join('')}</div></section><section class="card"><h2>地鐵重點</h2><div class="grid">${subway.map(r=>`<div class="transit-card"><h3>${r[0]}</h3><p><b>${r[1]}</b></p><p class="transit-meta">${r[2]}</p></div>`).join('')}</div></section><section class="card"><h2>計程車估價</h2><div class="grid">${taxi.map(r=>`<div class="transit-card"><h3>${r[0]}</h3><p><b>${r[1]}</b></p><p class="transit-meta">${r[2]}</p></div>`).join('')}</div></section><section class="card"><h2>叫車與付款提醒</h2><div class="grid">${tips.map(t=>`<div class="transit-card"><p>${t}</p></div>`).join('')}</div></section>`}
function renderShopping(){const items=data.shopping.filter(x=>matches(x));app.innerHTML=`<section class="card"><h2>🛍 購物與退稅 Checklist</h2><div class="grid">${items.map((x,i)=>{const isDone=localStorage.getItem(`seoul2026:shop:${i}`)==='1';return `<label class="shop-card ${isDone?'done':''}"><input type="checkbox" data-shop="${i}" ${isDone?'checked':''}> <strong>${x}</strong></label>`}).join('')}</div><p style="margin-top:14px">提醒：退稅時護照隨身帶，購物收據集中保管。</p></section>`;document.querySelectorAll('[data-shop]').forEach(b=>b.addEventListener('change',e=>{localStorage.setItem(`seoul2026:shop:${e.target.dataset.shop}`,e.target.checked?'1':'0');renderShopping()}))}
function speakKorean(text){if(!('speechSynthesis'in window)){alert('此瀏覽器不支援語音播放');return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang='ko-KR';u.rate=.86;speechSynthesis.speak(u)}
function renderPhrases(){const rows=data.phrases.filter(p=>matches(`${p.join(' ')} ${phraseRoman[p[1]]||''}`));app.innerHTML=`<section class="card"><h2>💬 常用韓文</h2><div class="grid">${rows.map(p=>`<div class="phrase-card"><p>${p[0]}</p><h3>${p[1]}</h3><div class="phrase-roman">${phraseRoman[p[1]]||''}</div><div class="actions"><button class="speak" data-speak="${p[1]}">播放</button><button class="copy" data-copy="${p[1]}">複製</button></div></div>`).join('')}</div></section>`;document.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',()=>navigator.clipboard.writeText(btn.dataset.copy).then(()=>alert('已複製：'+btn.dataset.copy))));document.querySelectorAll('[data-speak]').forEach(btn=>btn.addEventListener('click',()=>speakKorean(btn.dataset.speak)))}
function showUpdateToast(){document.getElementById('updateToast').classList.add('show')}
document.getElementById('updateNow').addEventListener('click',()=>location.reload());
function watchAppUpdates(reg){const ask=()=>navigator.serviceWorker.controller&&navigator.serviceWorker.controller.postMessage({type:'CHECK_FOR_UPDATES'});reg.update().catch(()=>{});ask();setInterval(()=>{reg.update().catch(()=>{});ask()},15*60*1000);reg.addEventListener('updatefound',()=>{const worker=reg.installing;if(!worker)return;worker.addEventListener('statechange',()=>{if(worker.state==='installed'&&navigator.serviceWorker.controller)showUpdateToast()})});navigator.serviceWorker.addEventListener('message',event=>{if(event.data&&event.data.type==='APP_UPDATE_READY')showUpdateToast()})}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentView=btn.dataset.view;render();scrollTo({top:0,behavior:'smooth'})}));searchBox.addEventListener('input',e=>{query=e.target.value.trim();render()});document.getElementById('topBtn').addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));document.getElementById('themeBtn').addEventListener('click',()=>{const dark=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',dark?'light':'dark');localStorage.setItem('seoul2026:theme',dark?'light':'dark')});if(localStorage.getItem('seoul2026:theme')==='dark')document.documentElement.setAttribute('data-theme','dark');let deferredPrompt;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;const b=document.getElementById('installBtn');b.hidden=false;b.onclick=()=>{deferredPrompt.prompt();deferredPrompt=null;b.hidden=true}});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').then(watchAppUpdates).catch(()=>{}));renderHeroStatus();renderWeatherStrip();loadWeather();loadPayment();render();
</script>
