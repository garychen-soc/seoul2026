*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#e0ecff 0,var(--bg) 260px,var(--bg));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",Arial,sans-serif;line-height:1.55}.app-header{position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;gap:12px;padding:16px;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}[data-theme=dark] .app-header{background:rgba(16,24,39,.94)}.eyebrow{color:#1d4ed8;font-weight:800;font-size:13px}[data-theme=dark] .eyebrow{color:#93c5fd}h1{margin:2px 0;font-size:22px}p{margin:0;color:var(--muted)}button{font:inherit}.hero{padding:14px 16px 8px;max-width:980px;margin:auto}.weather-card{background:linear-gradient(135deg,#0f62fe,#7c3aed);color:white;border-radius:24px;padding:18px;box-shadow:var(--shadow)}.weather-card p{color:rgba(255,255,255,.9)}.weather-main{font-size:20px;font-weight:900}.quick{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.quick a,.quick button{text-decoration:none;border:0;border-radius:14px;padding:9px 11px;font-size:13px;font-weight:900;color:#1d4ed8;background:#fff}.search{width:100%;margin-top:12px;padding:14px 16px;border:2px solid #94a3b8;border-radius:18px;background:var(--card);color:var(--ink);font-size:16px}.tabs{position:sticky;top:75px;z-index:19;display:flex;gap:8px;overflow:auto;padding:10px 16px;background:rgba(238,242,247,.94);border-bottom:1px solid var(--line)}[data-theme=dark] .tabs{background:rgba(16,24,39,.94)}.tab{white-space:nowrap;border:0;border-radius:999px;padding:10px 14px;background:var(--card);color:var(--ink);font-weight:800}.tab.active{background:var(--accent);color:#fff}main{max-width:980px;margin:auto;padding:14px 16px 90px}.card{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:16px;margin:0 0 14px;box-shadow:var(--shadow)}.day-head{display:flex;justify-content:space-between;gap:12px}.day-head h2{margin:0;font-size:19px;border-left:6px solid var(--accent);padding-left:10px}.tag{display:inline-block;font-size:12px;font-weight:700;color:#1e3a8a;background:var(--soft);padding:4px 8px;border-radius:999px;margin:2px}[data-theme=dark] .tag{color:#bfdbfe}.progress{min-width:60px;text-align:center;border-radius:18px;padding:8px 10px;background:var(--bg);border:1px solid var(--line);font-weight:900;color:#1d4ed8}[data-theme=dark] .progress{color:#93c5fd}.item{padding:14px 0 14px 20px;border-top:1px solid var(--line);border-left:4px solid #bfdbfe}.item:first-of-type{border-top:0;margin-top:8px}.time{display:inline-block;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;padding:3px 8px;border-radius:999px;font-weight:900;font-size:13px}[data-theme=dark] .time{background:#1f3a5f;color:#bfdbfe}.item-title{display:flex;gap:8px;align-items:flex-start;margin-top:6px}.item-title input{transform:scale(1.25);margin-top:4px}.done strong{text-decoration:line-through;color:#6b7280}.done{opacity:.65}.loc{color:var(--muted);font-size:13px;margin:4px 0}.note{color:var(--ink)}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.action{text-decoration:none;border-radius:14px;padding:9px 11px;font-size:13px;font-weight:800;color:#fff;background:var(--accent)}.action.alt{color:#1d4ed8;background:var(--soft)}[data-theme=dark] .action.alt{color:#dbeafe}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.ticket,.map-card,.shop-card,.phrase-card,.info-card{border:1px solid var(--line);border-radius:18px;padding:13px;background:var(--card)}.status{font-size:12px;font-weight:900;border-radius:999px;padding:4px 8px;display:inline-block;margin-bottom:8px}.status.done{color:#166534;background:#dcfce7}.status.todo{color:#92400e;background:#fef3c7}.top{position:fixed;right:16px;bottom:18px;border:0;border-radius:999px;background:var(--accent);color:#fff;padding:12px 15px;box-shadow:0 8px 24px rgba(0,0,0,.24);font-weight:900}.empty{text-align:center;color:var(--muted);padding:28px}.copy{border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:12px;padding:8px 10px;font-weight:800}.install-tip{font-size:13px;margin-top:8px;color:rgba(255,255,255,.9)}@media(max-width:620px){.tabs{top:73px}.grid{grid-template-columns:1fr}h1{font-size:20px}.app-header p{font-size:12px}}

<body>
<header class="app-header"><div><div class="eyebrow">🇰🇷 Seoul Trip</div><h1>首爾 2026 旅遊 App</h1><p>2026/6/30 - 7/5｜Stayrak Hotel｜手機離線版</p></div></header>
<section class="hero"><div class="weather-card"><div class="weather-main">☀ 今日提醒</div><p>出發前請用 Naver Weather / Google Weather 確認天氣；每日行程、票券、地圖、購物清單可離線查看。</p><div class="quick"><a href="https://www.google.com/maps/search/?api=1&query=Stayrak+Hotel+Seoul" target="_blank">飯店地圖</a><a href="https://www.google.com/maps/search/?api=1&query=Incheon+Airport" target="_blank">仁川機場</a><button id="themeBtn">深色模式</button><button id="installBtn" hidden>安裝 App</button></div><div class="install-tip">iPhone：Safari 分享 → 加入主畫面。Android：Chrome 選單 → 安裝應用程式。</div></div><input id="searchBox" class="search" placeholder="搜尋：景福宮、票券、泡麵、明洞、BT21、退稅... "></section>
<nav class="tabs"><button class="tab active" data-view="timeline">行程</button><button class="tab" data-view="summary">重點</button><button class="tab" data-view="tickets">票券</button><button class="tab" data-view="maps">地圖</button><button class="tab" data-view="shopping">購物</button><button class="tab" data-view="phrases">韓文</button><button class="tab" data-view="emergency">緊急</button></nav>

<script>
const data={days:[{id:'day1',title:'Day 1｜6/30（二）抵達首爾',summary:'台中出發、仁川抵達、入住 Stayrak Hotel',tags:['機場','入住','輕鬆'],items:[['17:00','TW670 台中 T2 出發','Taichung International Airport','提早 2 小時抵達機場，確認護照、電子票、eSIM QR code。','https://maps.google.com/?q=Taichung+International+Airport'],['20:45','抵達仁川 T1','Incheon International Airport T1','四人＋行李多可考慮 KKday/Klook 包車；若搭 AREX 可預購電子票。','https://maps.google.com/?q=Incheon+International+Airport+Terminal+1'],['晚間','前往 Stayrak Hotel','211-5 Toegye-ro, Jung-gu, Seoul','入住後便利商店補水、T-money/WOWPASS 儲值。','https://maps.google.com/?q=Stayrak+Hotel+211-5+Toegye-ro+Seoul']]},{id:'day2',title:'Day 2｜韓國歷史文化巡禮',summary:'韓服、景福宮、廣藏市場、北村、三清洞、益善洞',tags:['韓服','景福宮','廣藏市場','北村','益善洞'],items:[['08:00-08:50','Isaac Toast 明洞聖堂店','明洞聖堂附近','建議提早出門，外帶後在明洞聖堂附近享用。','https://maps.google.com/?q=Isaac+Toast+Myeongdong+Cathedral'],['09:00-11:30','韓服體驗＋景福宮','景福宮站','建議 KKday/Klook 預約韓服；穿韓服入景福宮免費。','https://maps.google.com/?q=Gyeongbokgung+Palace'],['12:00-13:30','廣藏市場午餐','Gwangjang Market','富村生牛肉、綠豆煎餅、刀削麵、麻藥飯捲、糯米麻花捲擇 3–4 樣即可。','https://maps.google.com/?q=Gwangjang+Market'],['14:00-16:00','北村韓屋村 → 三清洞 → Blue Bottle','安國站 / 北村文化中心','居民區請安靜；炎熱時先進咖啡店休息。','https://maps.google.com/?q=Bukchon+Cultural+Center'],['17:00-18:30','益善洞韓屋村','Ikseon-dong','傍晚燈光漂亮，建議留 60–90 分鐘。','https://maps.google.com/?q=Ikseon-dong+Hanok+Village'],['19:00','晚餐：王妃家明洞本店','Myeongdong','熱門時段可能排隊，建議提早取號。備案：江南麵店仁寺店。','https://maps.google.com/?q=Wangbijib+Myeongdong+Main+Store']]},{id:'day3',title:'Day 3｜首爾地標與明洞購物',summary:'DDP、南山首爾塔、明洞韓牛與購物',tags:['DDP','首爾塔','明洞','購物'],items:[['09:00-10:00','早餐：EGG DROP 明洞店','明洞','步行約 550m，輕食快速。','https://maps.google.com/?q=EGG+DROP+Myeongdong'],['10:00-12:00','東大門 DDP','Dongdaemun Design Plaza','若沒有看特展，60–90 分鐘即可；出發前查是否有想看的展覽。','https://maps.google.com/?q=Dongdaemun+Design+Plaza'],['14:15-17:50','南山纜車＋N 首爾塔','Namsan Cable Car / N Seoul Tower','建議 KKday/Klook 買纜車＋展望台套票；假日排隊需預留 30–60 分鐘。','https://maps.google.com/?q=N+Seoul+Tower'],['18:00-19:30','明洞站著吃韓牛','Myeongdong','建議 17:40 前抵達；若排太久可改烤肉備案。','https://maps.google.com/?q=Myeongdong+standing+beef+BBQ'],['19:30-21:30','明洞購物','LINE FRIENDS / Olive Young / ALAND / Harmony Mart','熱門商品看到就買，不建議等最後一天。','https://maps.google.com/?q=Olive+Young+Myeongdong+Flagship']]},{id:'day4',title:'Day 4｜新沙・狎鷗亭・聖水・漢江',summary:'江南潮流、聖水設計品牌、漢江泡麵夜景',tags:['江南','聖水','漢江','夜景'],items:[['09:00-10:00','早餐：瑞源粥','明洞','鮑魚粥、人蔘雞粥、蝦粥。','https://maps.google.com/?q=Seowon+Porridge+Myeongdong'],['10:35-12:00','新沙洞林蔭道','Sinsa-dong Garosu-gil','Gentle Monster、Tamburins、Cafe Kitsune。','https://maps.google.com/?q=Sinsa-dong+Garosu-gil'],['12:15-13:40','狎鷗亭羅德奧','Apgujeong Rodeo','London Bagel 建議外帶；K-Star Road 可順拍。','https://maps.google.com/?q=Apgujeong+Rodeo+Street'],['13:40-14:20','前往聖水洞','Seongsu-dong','修正版：狎鷗亭直接去聖水，不要繞弘大。','https://maps.google.com/?q=Seongsu-dong+Seoul'],['14:30-16:00','午餐：祖傳三代馬鈴薯排骨湯','Seongsu','避開正中午排隊較佳。','https://maps.google.com/?q=Somunnan+Seongsu+Gamjatang'],['16:00-18:30','聖水洞購物＋大林倉庫咖啡','Dior / Mardi / Stand Oil / Fwee / Amore / Daelim Changgo','排隊店多，建議先逛最想買的品牌。','https://maps.google.com/?q=Daelim+Changgo+Seongsu'],['18:40-21:10','纛島漢江公園','Ttukseom Hangang Park','騎腳踏車、GS25 自煮泡麵、夜景散步。可先下載 Seoul Bike / Ttareungi。','https://maps.google.com/?q=Ttukseom+Hangang+Park']]},{id:'day5',title:'Day 5｜弘大・明洞收尾',summary:'弘大延南洞、明洞聖堂、晚餐收尾',tags:['弘大','明洞聖堂','購物'],items:[['10:00','前往弘大','弘大入口站','弘大店家多 11:00 後才開，不建議太早去。','https://maps.google.com/?q=Hongdae+Shopping+Street'],['10:30-15:00','弘大 / 延南洞逛街＋午餐','Hongdae / Yeonnam','延南站著吃可體驗；夏天若太熱改有冷氣餐廳。','https://maps.google.com/?q=Yeonnam-dong+Seoul'],['15:00-17:00','明洞補購或回飯店休息','Myeongdong','若體力尚可，建議直接從弘大去明洞，減少來回交通。','https://maps.google.com/?q=Myeongdong+Shopping+Street'],['17:00-19:00','PINES / 明洞聖堂周邊','PAGE 明洞大樓 3F / Myeongdong Cathedral','黃昏拍照漂亮。','https://maps.google.com/?q=Myeongdong+Cathedral'],['20:00-21:30','元堂馬鈴薯排骨湯 明洞 1 號店','Myeongdong','晚餐後步行 12–15 分鐘回飯店。','https://maps.google.com/?q=Wondang+Gamjatang+Myeongdong']]},{id:'day6',title:'Day 6｜7/5（日）退房回台中',summary:'早餐、退房、仁川 T2 回台中',tags:['退房','早餐','機場'],items:[['08:00-08:50','整理行李','Stayrak Hotel','確認護照、電子票、退稅單、行李重量。','https://maps.google.com/?q=Stayrak+Hotel+Seoul'],['09:00-10:10','早餐三選一','Lucky Seoul / Isaac / BeansBins','首選 Lucky Seoul；趕時間選 Isaac；想吃甜點選 BeansBins。','https://maps.google.com/?q=Lucky+Seoul+Myeongdong'],['10:30','退房','Stayrak Hotel','若早到機場可逛免稅店。','https://maps.google.com/?q=Stayrak+Hotel+Seoul'],['14:50','LJ737 仁川 T2 出發','Incheon T2','建議至少 12:00 前抵達機場。','https://maps.google.com/?q=Incheon+International+Airport+Terminal+2'],['16:30','抵達台中 T1','Taichung','旅程結束。','https://maps.google.com/?q=Taichung+International+Airport']]}],tickets:[['已購','eSIM','已完成','出發前確認 QR code / APN / 啟用方式截圖離線保存。'],['建議購買','韓服體驗','KKday / Klook','可預約時段、常有折扣，穿韓服入景福宮免費。'],['建議購買','N 首爾塔展望台＋纜車套票','KKday / Klook','可省現場購票時間，旺季尤其有用。'],['可考慮','WOWPASS / T-money','KKday / Klook / 現場','若不用 WOWPASS，也至少準備 T-money。'],['可考慮','仁川機場接送包車','KKday / Klook','4 人＋行李多時很值得，尤其晚班機抵達。'],['可考慮','AREX 直達列車','KKday / Klook','若不包車，AREX 電子票通常較便宜。'],['可考慮','漢江腳踏車 / 遊船','現場 / 旅遊平台','若想增加夜景體驗可安排，但保留彈性。']],shopping:['Olive Young 熱門商品','Gentle Monster','Tamburins','Stand Oil','Mardi Mercredi','Fwee','Amore Seongsu','HBAF 杏仁','泡麵 / 海苔 / 零食','LINE FRIENDS / BT21','Aland / Musinsa Standard','退稅收據整理','行李秤檢查'],phrases:[['請刷卡','카드로 계산할게요'],['可以打包嗎？','포장해 주세요'],['不要太辣','덜 맵게 해주세요'],['請問廁所在哪裡？','화장실 어디예요?'],['我們要去這裡','여기로 가 주세요'],['謝謝','감사합니다'],['請問有中文菜單嗎？','중국어 메뉴 있어요?'],['這個多少錢？','이거 얼마예요?']],summary:[['Day 4 修正','狎鷗亭直接前往聖水，不建議繞弘大，減少交通時間。'],['票券建議','韓服、N 首爾塔、AREX/包車最適合先在 KKday/Klook 比價。'],['交通提醒','韓國地圖建議 Google + Naver/Kakao 並用，步行與店名搜尋以 Naver/Kakao 較準。'],['購物策略','明洞與聖水熱門商品看到就買，最後一天只補貨。'],['離線備份','eSIM、機票、飯店地址、護照影本、保險文件都截圖保存。']],emergency:[['住宿','Stayrak Hotel, 211-5 Toegye-ro, Jung-gu, Seoul'],['韓國緊急電話','警察 112 / 消防救護 119 / 旅遊諮詢 1330'],['台灣相關','駐韓代表處與旅平險聯絡資料請出發前加入手機通訊錄。'],['遺失物','護照遺失：先報警取得報案證明，再聯絡駐外單位。']]};
const app=document.getElementById('app'),searchBox=document.getElementById('searchBox');let currentView='timeline',query='';
const itemObj=a=>({time:a[0],title:a[1],location:a[2],note:a[3],maps:a[4]});const keyFor=(d,i)=>`seoul2026:${d}:${i}`;const checked=(d,i)=>localStorage.getItem(keyFor(d,i))==='1';const setChecked=(d,i,v)=>localStorage.setItem(keyFor(d,i),v?'1':'0');const naver=t=>`https://map.naver.com/p/search/${encodeURIComponent(t)}`;const kakao=t=>`https://map.kakao.com/link/search/${encodeURIComponent(t)}`;const matches=t=>!query||t.toLowerCase().includes(query.toLowerCase());
function render(){if(currentView==='timeline')return renderTimeline();if(currentView==='summary')return renderInfo('重點修正與提醒',data.summary);if(currentView==='tickets')return renderTickets();if(currentView==='maps')return renderMaps();if(currentView==='shopping')return renderShopping();if(currentView==='phrases')return renderPhrases();renderInfo('緊急資訊',data.emergency)}
function renderTimeline(){const html=data.days.map(day=>{const items=day.items.map(itemObj);const visible=items.filter(i=>matches(`${day.title} ${day.summary} ${day.tags.join(' ')} ${i.time} ${i.title} ${i.location} ${i.note}`));if(!visible.length&&query)return'';const done=items.filter((_,i)=>checked(day.id,i)).length;return `<section class="card"><div class="day-head"><div><h2>${day.title}</h2><p>${day.summary}</p><div>${day.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div><div class="progress">${done}/${items.length}</div></div>${visible.map(item=>{const idx=items.findIndex(x=>x.title===item.title);const isDone=checked(day.id,idx);return `<div class="item ${isDone?'done':''}"><span class="time">${item.time}</span><label class="item-title"><input type="checkbox" data-day="${day.id}" data-idx="${idx}" ${isDone?'checked':''}><strong>${item.title}</strong></label><div class="loc">📍 ${item.location}</div><div class="note">${item.note}</div><div class="actions"><a class="action" target="_blank" href="${item.maps}">Google Maps</a><a class="action alt" target="_blank" href="${naver(item.title)}">Naver</a><a class="action alt" target="_blank" href="${kakao(item.title)}">Kakao</a></div></div>`}).join('')}</section>`}).join('');app.innerHTML=html||'<div class="card empty">找不到符合的行程</div>';document.querySelectorAll('input[data-day]').forEach(box=>box.addEventListener('change',e=>{setChecked(e.target.dataset.day,e.target.dataset.idx,e.target.checked);renderTimeline()}))}
function renderInfo(title,rows){const list=rows.filter(r=>matches(r.join(' ')));app.innerHTML=`<section class="card"><h2>📌 ${title}</h2><div class="grid">${list.map(r=>`<div class="info-card"><h3>${r[0]}</h3><p>${r[1]}</p></div>`).join('')}</div></section>`}
function renderTickets(){const rows=data.tickets.filter(t=>matches(t.join(' ')));app.innerHTML=`<section class="card"><h2>🎫 票券與預約</h2><div class="grid">${rows.map(t=>`<div class="ticket"><span class="status ${t[0]==='已購'?'done':'todo'}">${t[0]}</span><h3>${t[1]}</h3><p><b>平台：</b>${t[2]}</p><p>${t[3]}</p></div>`).join('')}</div></section>`}
function renderMaps(){const items=data.days.flatMap(d=>d.items.map(a=>({...itemObj(a),day:d.title}))).filter(i=>matches(`${i.day} ${i.title} ${i.location} ${i.note}`));app.innerHTML=`<section class="card"><h2>📍 地圖導航</h2><div class="grid">${items.map(i=>`<div class="map-card"><h3>${i.title}</h3><p>${i.day}</p><p>📍 ${i.location}</p><div class="actions"><a class="action" target="_blank" href="${i.maps}">Google</a><a class="action alt" target="_blank" href="${naver(i.title)}">Naver</a><a class="action alt" target="_blank" href="${kakao(i.title)}">Kakao</a></div></div>`).join('')}</div></section>`}
function renderShopping(){const items=data.shopping.filter(x=>matches(x));app.innerHTML=`<section class="card"><h2>🛍 購物與退稅 Checklist</h2><div class="grid">${items.map((x,i)=>{const isDone=localStorage.getItem(`seoul2026:shop:${i}`)==='1';return `<label class="shop-card ${isDone?'done':''}"><input type="checkbox" data-shop="${i}" ${isDone?'checked':''}> <strong>${x}</strong></label>`}).join('')}</div><p style="margin-top:14px">提醒：退稅時護照隨身帶，購物收據集中保管。</p></section>`;document.querySelectorAll('[data-shop]').forEach(b=>b.addEventListener('change',e=>{localStorage.setItem(`seoul2026:shop:${e.target.dataset.shop}`,e.target.checked?'1':'0');renderShopping()}))}
function renderPhrases(){const rows=data.phrases.filter(p=>matches(p.join(' ')));app.innerHTML=`<section class="card"><h2>💬 常用韓文</h2><div class="grid">${rows.map(p=>`<div class="phrase-card"><p>${p[0]}</p><h3>${p[1]}</h3><button class="copy" data-copy="${p[1]}">複製</button></div>`).join('')}</div></section>`;document.querySelectorAll('[data-copy]').forEach(btn=>btn.addEventListener('click',()=>navigator.clipboard.writeText(btn.dataset.copy).then(()=>alert('已複製：'+btn.dataset.copy))))}
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentView=btn.dataset.view;render();scrollTo({top:0,behavior:'smooth'})}));searchBox.addEventListener('input',e=>{query=e.target.value.trim();render()});document.getElementById('topBtn').addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));document.getElementById('themeBtn').addEventListener('click',()=>{const dark=document.documentElement.getAttribute('data-theme')==='dark';document.documentElement.setAttribute('data-theme',dark?'light':'dark');localStorage.setItem('seoul2026:theme',dark?'light':'dark')});if(localStorage.getItem('seoul2026:theme')==='dark')document.documentElement.setAttribute('data-theme','dark');let deferredPrompt;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e;const b=document.getElementById('installBtn');b.hidden=false;b.onclick=()=>{deferredPrompt.prompt();deferredPrompt=null;b.hidden=true}});if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));render();
</script>
</body>
</html>
